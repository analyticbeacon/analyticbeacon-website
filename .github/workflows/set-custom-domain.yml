name: Set Custom Domain
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  set-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Set custom domain for GitHub Pages
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"cname":"analyticbeacon.com"}' | cat
          echo "Done"
      - name: Ensure CNAME file exists
        run: |
          git config user.email "analyticbeacon@gmail.com"
          git config user.name "Analytic Beacon"
          echo "analyticbeacon.com" > CNAME
          git add CNAME
          git diff --staged --quiet || git commit -m "ensure: CNAME for analyticbeacon.com"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
